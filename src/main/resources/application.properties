# Enables logging of Mongo mapping events
logging.level.org.springframework=INFO
logging.level.eu.europa.eu.esig=DEBUG
logging.level.org.springframework.boot.actuate.endpoint.web=DEBUG

management.endpoints.access.default=unrestricted
spring.web.error.include-stacktrace=ALWAYS
server.port=8080
spring.webflux.static-path-pattern=/public/**
spring.webflux.webjars-path-pattern=/webjars/**
spring.messages.basename=i18n/messages

# cors
cors.origins=*
cors.originPatterns=*
cors.methods=*
cors.headers=*
cors.credentials=false
cors.maxAge=3600

trust-validator.dss.cache-location=dss-cache
trust-validator.dss.time-to-live=P1D

#Wallet Providers
trust-validator.trust-sources.wallet-providers.location=https://trustedlist.serviceproviders.eudiw.dev/LOTL/01.xml
trust-validator.trust-sources.wallet-providers.signature-verification.location=classpath:lotl.jks
trust-validator.trust-sources.wallet-providers.signature-verification.key-store-type=JKS
trust-validator.trust-sources.wallet-providers.signature-verification.password=
trust-validator.trust-sources.wallet-providers.issuance-service=http://uri.etsi.org/19602/SvcType/WalletSolution/Issuance
trust-validator.trust-sources.wallet-providers.revocation-service=http://uri.etsi.org/19602/SvcType/WalletSolution/Revocation

